image: gitpod/workspace-full-vnc

tasks:
  - name: Install & Start IRIS
    init: npm install
    command: npm run dev

ports:
  - port: 5173 # Default Vite Renderer Port
    onOpen: ignore
  - port: 6080 # Gitpod VNC web client (This is where the desktop app UI shows up)
    onOpen: open-preview

github:
  prebuilds:
    master: true
    branches: true
    pullRequests: true
    addComment: true
    addBadge: true
    addLabel: true
