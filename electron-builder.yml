appId: com.harshpandey.iris
productName: IRIS AI
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**

# --- WINDOWS CONFIGURATION ---
win:
  executableName: iris-ai
  target:
    - target: nsis # Generates the professional Setup Wizard (.exe)
    - target: msi # Generates the MSI installer (.msi)

# --- THE MULTI-STEP WIZARD (NSIS) ---
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}

  # The Magic Flags for a Multi-Step Wizard:
  oneClick: false # Disables the silent auto-install
  allowToChangeInstallationDirectory: true # Step: Choose Save Location
  createDesktopShortcut: always # Step: Create Desktop Icon
  createStartMenuShortcut: true # Step: Add to Start Menu
  runAfterFinish: true # Step: Launch after closing installer

# --- MSI SPECIFIC CONFIG ---
msi:
  oneClick: false
  runAfterFinish: true
  shortcutName: ${productName}
  createDesktopShortcut: always

# --- MAC CONFIGURATION ---
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}

# --- LINUX CONFIGURATION ---
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: Harsh Pandey
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}

npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
